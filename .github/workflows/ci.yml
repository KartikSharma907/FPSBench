name: CI

on:
  push:
    branches: [main, public-release]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev extras)
        run: pip install -e '.[dev]'
      - name: Unit tests
        run: pytest -q
      - name: Validate published annotations (0 critical)
        run: python scripts/validate_annotations.py annotations/fpsbench_v1.jsonl
